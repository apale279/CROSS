function fs(v){if(v==null)return '';if(typeof v==='object')return JSON.stringify(v);return String(v);}
function cb(v){const s=CBGM[v];return s?'<span style="display:inline-block;padding:1px 8px;border-radius:9px;background:'+s.split(';')[0]+';'+s.split(';')[1]+';font-weight:700;font-size:11px;border:1px solid rgba(0,0,0,.15)">'+v+'</span>':v||'';}
function ch(col,val){if(['codiceColore','codiceColoreMissione','pma_codice_colore'].includes(col))return cb(val);const s=fs(val);return s.length>65?'<span title="'+s.replace(/"/g,"'")+'">'+s.slice(0,65)+'…</span>':s;}
function gc(tab){const rows=D[tab];if(!rows.length)return[];const all=[...new Set(rows.flatMap(r=>Object.keys(r)))].filter(c=>!HID.has(c));const pr=(P[tab]||[]).filter(c=>all.includes(c));return[...pr,...all.filter(c=>!pr.includes(c))];}
function rt(tab){
  const rows=D[tab]||[];const cols=gc(tab);
  if(!cols.length){document.getElementById('bd-'+tab).innerHTML='<tr><td class="nd">Nessun dato</td></tr>';return;}
  document.getElementById('h-'+tab).innerHTML='<tr>'+cols.map(c=>{const d=ST.sc[tab]===c?(ST.sd[tab]===1?'▲':'▼'):'↕';return'<th onclick="sb(''+tab+'',''+c+'')" title="'+c+'">'+c+'<span style="opacity:.5;font-size:10px;margin-left:3px">'+d+'</span></th>';}).join('')+'</tr>';

}

  el.innerHTML=cards.map(c=>'<div class="sc"><div class="n">'+c.n+'</div><div class="l">'+c.l+'</div></div>').join('');
}
