};
const PRIORITY = {"eventi":["idEvento","tipoEvento","luogo","codiceColore","stato","createdAt"],"missioni":["idMissione","mezzo","stato","eventoCorrelato","codiceColoreMissione","ospedaleDestinazione","apertura"],"pazienti":["idPaziente","pettorale","nome","cognome","codiceColore","stato","statoPzPma","esito","mezzo","ospedaleDestinazione"],"valutazioni":["pazienteId","pettorale","nome","cognome","tipo","creatoIl"]};
const HIDDEN = ["_docId","idUnivoco","eventoIdUnivoco","missioneIdUnivoco","manifestationId","pmaSchedaInizializzata","storicoStati","tratteMissione","pmaScheda","firma_paziente_base64","dimissione_firma_medico_base64"];
const state = { sortCol:{}, sortDir:{} };

function fStr(v){
  if(v===null||v===undefined) return '';
  if(typeof v==='object') return JSON.stringify(v);
  return String(v);
}
function colourBadge(v){
  if(!v) return '';
  const map={bianco:'#e8e8e8;color:#333',Bianco:'#e8e8e8;color:#333',verde:'#4caf50;color:#fff',Verde:'#4caf50;color:#fff',giallo:'#f9a825;color:#333',Giallo:'#f9a825;color:#333',rosso:'#d32f2f;color:#fff',Rosso:'#d32f2f;color:#fff',nero:'#333;color:#fff',Nero:'#333;color:#fff'};
  const s=map[v]||'';
  return s?'<span class="badge" style="background:'+s.split(';')[0]+';'+s.split(';')[1]+'">'+v+'</span>':v;
}
function cellHtml(col,val){
  if(['codiceColore','codiceColoreMissione','pma_codice_colore'].includes(col)) return colourBadge(val);
  if(col==='stato') return val?'<b>'+val+'</b>':'';
  if(typeof val==='object'&&val) return '<span title="'+JSON.stringify(val).replace(/"/g,"'")+'">'+JSON.stringify(val).substring(0,50)+'…</span>';
  const s=fStr(val);
  return s.length>70?'<span title="'+s.replace(/"/g,"'")+'">'+s.substring(0,70)+'…</span>':s;
}
function getCols(tab){
  const rows=DATA[tab];if(!rows.length) return [];
  const all=[...new Set(rows.flatMap(r=>Object.keys(r)))].filter(c=>!HIDDEN.includes(c));
  const prio=(PRIORITY[tab]||[]).filter(c=>all.includes(c));
  return [...prio,...all.filter(c=>!prio.includes(c))];
}
function renderTable(tab){
  const rows=DATA[tab]||[]; const cols=getCols(tab);
  if(!cols.length){document.getElementById('body-'+tab).innerHTML='<tr><td class="no-data">Nessun dato</td></tr>';return;}
  document.getElementById('hdr-'+tab).innerHTML='<tr>'+cols.map(c=>{
    const d=state.sortCol[tab]===c?(state.sortDir[tab]===1?'▲':'▼'):'↕';
    return '<th onclick="sortBy(''+tab+'',''+c+'')" title="'+c+'">'+c+' <span style="opacity:.6;font-size:10px">'+d+'</span></th>';
  }).join('')+'</tr>';
  const q=(document.getElementById('search-'+tab)?.value||'').toLowerCase();
  let vis=rows.filter(r=>!q||cols.some(c=>fStr(r[c]).toLowerCase().includes(q)));
  const sc=state.sortCol[tab];
  if(sc){const d=state.sortDir[tab]??1; vis.sort((a,b)=>{const av=fStr(a[sc]),bv=fStr(b[sc]);return av<bv?-d:av>bv?d:0;});}
  const tbody=document.getElementById('body-'+tab);
  if(!vis.length){tbody.innerHTML='<tr><td colspan="'+cols.length+'" class="no-data">Nessun risultato</td></tr>';}
  else{tbody.innerHTML=vis.map(r=>'<tr>'+cols.map(c=>'<td>'+cellHtml(c,r[c])+'</td>').join('')+'</tr>').join('');}
  document.getElementById('badge-'+tab).textContent=vis.length+' / '+rows.length+' righe';
  document.getElementById('cnt-'+tab).textContent=rows.length;
}
function renderStats(tab){
  const rows=DATA[tab]; const el=document.getElementById('stats-'+tab); if(!el) return;
  let cards=[];
  if(tab==='pazienti'){
    const byC={};rows.forEach(p=>{const c=p.pma_codice_colore||p.codiceColore||'N/D';byC[c]=(byC[c]||0)+1;});
    cards.push({num:rows.length,lbl:'Totale'});
    cards.push({num:rows.filter(p=>p.esito==='Trasporta').length,lbl:'Trasportati'});
    ['Rosso','rosso','Giallo','giallo','Verde','verde','Bianco','bianco'].filter((v,i,a)=>a.indexOf(v)===i).forEach(c=>{if(byC[c])cards.push({num:byC[c],lbl:'Cod.'+c});});
  } else if(tab==='missioni'){
    const bs={};rows.forEach(m=>{bs[m.stato]=(bs[m.stato]||0)+1;});
    cards.push({num:rows.length,lbl:'Totale'});
    Object.entries(bs).sort((a,b)=>b[1]-a[1]).slice(0,5).forEach(([s,n])=>cards.push({num:n,lbl:s}));
  } else if(tab==='eventi'){
    cards.push({num:rows.length,lbl:'Totale'});
    cards.push({num:rows.filter(e=>e.stato!==false).length,lbl:'Aperti'});
    cards.push({num:rows.filter(e=>e.stato===false).length,lbl:'Chiusi'});
  } else if(tab==='valutazioni'){
    const bt={};rows.forEach(v=>{bt[v.tipo]=(bt[v.tipo]||0)+1;});
    cards.push({num:rows.length,lbl:'Totale'});
    Object.entries(bt).forEach(([t,n])=>cards.push({num:n,lbl:t}));
  }
  el.innerHTML=cards.map(c=>'<div class="stat-card"><div class="num">'+c.num+'</div><div class="lbl">'+c.lbl+'</div></div>').join('');
}
function sortBy(tab,col){
  state.sortCol[tab]===col?state.sortDir[tab]=(state.sortDir[tab]??1)*-1:(state.sortCol[tab]=col,state.sortDir[tab]=1);
  renderTable(tab);
}
function filterTable(tab){renderTable(tab);}
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>{['eventi','missioni','pazienti','valutazioni'].forEach((n,j)=>{if(i===j)t.classList.toggle('active',n===tab);});});
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
}
['eventi','missioni','pazienti','valutazioni'].forEach(t=>{renderStats(t);renderTable(t);});
</script>
